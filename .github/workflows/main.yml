name: Android CI (Autodidata Compilador)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Clonar o Repositório
      uses: actions/checkout@v4

    - name: ☕ Configurar o Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: 🔑 Dar permissão ao Gradle
      run: chmod +x gradlew

    - name: 🛠️ Compilar o APK (Debug)
      # O --stacktrace ajuda a ver o erro real se a compilação travar
      run: ./gradlew assembleDebug --stacktrace

    - name: 🔍 Localizar o APK (Rastreador)
      # Esse comando vai imprimir no seu log o caminho exato do arquivo gerado
      run: find . -name "*.apk"

    - name: 📦 Subir o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: Autodidata-Play-APK
        # O segredo está nos dois asteriscos (**), eles buscam em subpastas
        path: "**/build/outputs/apk/debug/*.apk"
        # Se ele não achar nada, o build vai dar ERRO (assim a gente não fica no escuro)
        if-no-files-found: error
